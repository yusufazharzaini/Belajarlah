<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 6.600+ Kosakata Jepang - Belajar dengan Tema</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0618;
            --bg-secondary: #120d2a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --text-primary: #f0e8ff;
            --text-secondary: #b8a8e8;
            --text-muted: #6a5a8a;
            --accent-1: #ff8a9e;
            --accent-2: #fad0c4;
            --accent-3: #ffd1ff;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Quicksand', 'Noto Sans JP', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(255, 138, 158, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(255, 209, 255, 0.05) 0%, transparent 50%);
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-3);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            text-align: center;
            padding: 30px 20px 24px;
            background: var(--bg-card);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🌸';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 80px;
            opacity: 0.06;
            transform: rotate(15deg);
        }

        .header::after {
            content: '🗾';
            position: absolute;
            bottom: -30px;
            left: -20px;
            font-size: 100px;
            opacity: 0.04;
            transform: rotate(-10deg);
        }

        .header h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .header .subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            letter-spacing: 6px;
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }

        .header .badge-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
            position: relative;
            z-index: 1;
        }

        .header .badge {
            padding: 5px 16px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .header .badge:hover {
            background: rgba(255, 138, 158, 0.1);
            border-color: var(--accent-1);
        }

        .header .badge .highlight {
            color: var(--accent-1);
        }

        /* ============================================================
           STATS
           ============================================================ */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin: 0 0 24px 0;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .stats .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .stats .stat-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 138, 158, 0.2);
        }

        .stats .stat-card .number {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-1);
            display: block;
        }

        .stats .stat-card .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ============================================================
           SEARCH & FILTERS
           ============================================================ */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .controls input,
        .controls select {
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(6px);
        }

        .controls input::placeholder {
            color: var(--text-muted);
        }

        .controls input:focus,
        .controls select:focus {
            border-color: var(--accent-1);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(255, 138, 158, 0.08);
        }

        .controls input {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
        }

        .controls select {
            cursor: pointer;
            min-width: 130px;
        }

        .controls select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* ============================================================
           THEME FILTER BUTTONS
           ============================================================ */
        .theme-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .theme-filters button {
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .theme-filters button:hover {
            background: rgba(255, 138, 158, 0.1);
            border-color: var(--accent-1);
            color: var(--text-primary);
        }

        .theme-filters button.active {
            background: linear-gradient(135deg, rgba(255, 138, 158, 0.2), rgba(255, 209, 255, 0.1));
            border-color: var(--accent-1);
            color: var(--accent-1);
            box-shadow: 0 0 20px rgba(255, 138, 158, 0.08);
        }

        /* ============================================================
           VOCAB GRID
           ============================================================ */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ============================================================
           VOCAB CARD
           ============================================================ */
        .vocab-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 18px 18px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vocab-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 138, 158, 0.2);
            box-shadow: var(--shadow);
        }

        .vocab-card .level-tag {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 0.55rem;
            padding: 2px 10px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .vocab-card .theme-tag {
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 0.55rem;
            padding: 2px 10px;
            border-radius: 50px;
            background: rgba(255, 138, 158, 0.12);
            border: 1px solid rgba(255, 138, 158, 0.15);
            color: var(--accent-1);
            letter-spacing: 0.3px;
        }

        .vocab-card .kanji {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-3);
            display: block;
            margin-top: 4px;
            letter-spacing: 2px;
        }

        .vocab-card .hiragana {
            font-size: 1rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 2px;
        }

        .vocab-card .meaning {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
            margin-bottom: 2px;
        }

        .vocab-card .type {
            display: inline-block;
            font-size: 0.65rem;
            padding: 1px 12px;
            border-radius: 50px;
            background: rgba(255, 209, 255, 0.08);
            border: 1px solid rgba(255, 209, 255, 0.1);
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .vocab-card .example {
            font-size: 0.85rem;
            color: #b0c0e8;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 10px;
            border-left: 3px solid var(--accent-1);
            margin-top: 4px;
            line-height: 1.6;
        }

        .vocab-card .example .jp {
            color: #d8d0f0;
        }

        .vocab-card .example .id {
            color: #90b0e0;
            font-size: 0.8rem;
        }

        /* ============================================================
           NO RESULT
           ============================================================ */
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-result .big {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }

        /* ============================================================
           PAGINATION
           ============================================================ */
        .pagination {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin: 28px 0 16px;
        }

        .pagination button {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .pagination button:hover {
            background: rgba(255, 138, 158, 0.08);
        }

        .pagination button.active {
            background: rgba(255, 138, 158, 0.15);
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        /* ============================================================
           SCROLL TO TOP
           ============================================================ */
        .scroll-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: var(--bg-primary);
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(255, 138, 158, 0.25);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            z-index: 999;
        }

        .scroll-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .scroll-top:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 32px rgba(255, 138, 158, 0.35);
        }

        /* ============================================================
           LOADING
           ============================================================ */
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--accent-1);
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            padding: 24px 20px 8px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: 24px;
        }

        .footer .heart {
            color: var(--accent-1);
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .header .subtitle {
                font-size: 0.85rem;
                letter-spacing: 3px;
            }

            .vocab-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .controls input {
                min-width: 150px;
                max-width: 100%;
            }

            .controls select {
                min-width: 100px;
            }

            .stats {
                grid-template-columns: repeat(3, 1fr);
            }

            .stats .stat-card .number {
                font-size: 1.2rem;
            }

            .vocab-card .kanji {
                font-size: 1.4rem;
            }

            .theme-filters button {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .vocab-card {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================

        function updateStats(data) {
            document.getElementById('totalVocab').textContent = data.length;
            document.getElementById('footerTotal').textContent = data.length;
            document.getElementById('totalDisplay').textContent = data.length;

            const n5 = data.filter(d => d.level === 'n5').length;
            const n4 = data.filter(d => d.level === 'n4').length;
            const n3 = data.filter(d => d.level === 'n3').length;
            const extra = data.filter(d => d.level === 'extra').length;

            document.getElementById('n5Count').textContent = n5;
            document.getElementById('n4Count').textContent = n4;
            document.getElementById('n3Count').textContent = n3;
            document.getElementById('extraCount').textContent = extra;

            // Hitung tema aktif
            const activeTheme = document.querySelector('.theme-filters button.active');
            if (activeTheme && activeTheme.dataset.theme !== 'all') {
                const themeCount = data.filter(d => d.theme === activeTheme.dataset.theme).length;
                document.getElementById('themeCount').textContent = themeCount;
            } else {
                document.getElementById('themeCount').textContent = data.length;
            }

        function render() {

            const theme = activeThemeBtn ? activeThemeBtn.dataset.theme : 'all';

            filteredData = allData.filter(item => {
                const matchSearch =
                    item.kanji.includes(searchTerm) ||
                    item.hiragana.includes(searchTerm) ||
                    item.meaning.toLowerCase().includes(searchTerm) ||
                    item.example.toLowerCase().includes(searchTerm);

                const matchLevel = level === 'all' || item.level === level;
                const matchType = type === 'all' || item.type === type;
                const matchTheme = theme === 'all' || item.theme === theme;

                return matchSearch && matchLevel && matchType && matchTheme;
            });

            const end = start + perPage;

                        <span class="kanji">${item.kanji}</span>
                        <span class="hiragana">${item.hiragana}</span>
                        <span class="meaning">${item.meaning}</span>
                        <span class="type">${item.type.replace('-', ' ').toUpperCase()}</span>
                        <div class="example">
                            <div class="jp">📖 ${item.example}</div>
                        </div>
                    </div>
                `).join('');
            }

            // Pagination
            pagination.innerHTML = '';
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.className = i === currentPage ? 'active' : '';
                    btn.onclick = () => { currentPage = i;
                        render(); };
                    pagination.appendChild(btn);
                }
            }

            // Scroll ke atas
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ================================================================
        //  EVENT LISTENERS
        // ================================================================

        searchInput.addEventListener('input', () => { currentPage = 1;
            render(); });
        levelFilter.addEventListener('change', () => { currentPage = 1;
            render(); });
        typeFilter.addEventListener('change', () => { currentPage = 1;
            render(); });

        // Theme filter buttons
        document.querySelectorAll('.theme-filters button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.theme-filters button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPage = 1;
                render();
            });
        });

        // Scroll to top
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });

        // ================================================================
        //  INISIALISASI
        // ================================================================

        render();

        // Tampilkan info di console
        console.log('🌸 ===== KOSAKATA JEPANG LENGKAP ===== 🌸');
        console.log('📚 TOTAL KOSAKATA:', allData.length);
        console.log('📊 N5:', allData.filter(d => d.level === 'n5').length);
        console.log('📊 N4:', allData.filter(d => d.level === 'n4').length);
        console.log('📊 N3:', allData.filter(d => d.level === 'n3').length);
        console.log('📊 Tambahan:', allData.filter(d => d.level === 'extra').length);
        console.log('');
        console.log('📂 RINCIAN PER TEMA:');
        const themes = {};
        allData.forEach(d => {
            if (!themes[d.theme]) themes[d.theme] = 0;
            themes[d.theme]++;
        });
        Object.keys(themes).sort().forEach(t => {
            console.log(`   ${t}: ${themes[t]} kosakata`);
        });
        console.log('');
        console.log('🌸 日本語 勉強 がんばって！');
        console.log('💡 Gunakan filter tema untuk belajar per kategori!');
    </script>
</body>
</html>
