<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 Kosakata Jepang 6.600+</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>📚 日本語 単語 大全</h1>
        <div class="subtitle">✦ BELAJAR KOSAKATA JEPANG ✦</div>
        <div class="badge-container">
            <span class="badge">🎯 <span class="highlight">N5</span> • <span id="n5Badge">0</span></span>
            <span class="badge">🎯 <span class="highlight">N4</span> • <span id="n4Badge">0</span></span>
            <span class="badge">🎯 <span class="highlight">N3</span> • <span id="n3Badge">0</span></span>
            <span class="badge" style="border-color: var(--accent-1);">✨ Total <span class="highlight" id="totalBadge">0</span></span>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card"><span class="number" id="totalVocab">0</span><span class="label">Total</span></div>
        <div class="stat-card"><span class="number" id="n5Count">0</span><span class="label">N5</span></div>
        <div class="stat-card"><span class="number" id="n4Count">0</span><span class="label">N4</span></div>
        <div class="stat-card"><span class="number" id="n3Count">0</span><span class="label">N3</span></div>
        <div class="stat-card"><span class="number" id="extraCount">0</span><span class="label">Tambahan</span></div>
        <div class="stat-card"><span class="number" id="themeCount">0</span><span class="label">Tema Aktif</span></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 Cari kanji, hiragana, atau arti..." />
        <select id="levelFilter">
            <option value="all">📊 Semua Level</option>
            <option value="n5">🎯 N5</option>
            <option value="n4">🎯 N4</option>
            <option value="n3">🎯 N3</option>
            <option value="extra">✨ Tambahan</option>
        </select>
        <select id="typeFilter">
            <option value="all">📂 Semua Jenis</option>
            <option value="kata-benda">Kata Benda</option>
            <option value="verba">Verba</option>
            <option value="i-adjektiva">I-Adjektiva</option>
            <option value="na-adjektiva">Na-Adjektiva</option>
            <option value="kata-ganti">Kata Ganti</option>
            <option value="kata-bilangan">Kata Bilangan</option>
            <option value="kata-tanya">Kata Tanya</option>
            <option value="kata-keterangan">Kata Keterangan</option>
            <option value="kata-penghubung">Kata Penghubung</option>
            <option value="kata-tunjuk">Kata Tunjuk</option>
            <option value="partikel">Partikel</option>
            <option value="kata-seru">Kata Seru</option>
            <option value="ucapan">Ucapan</option>
        </select>
    </div>

    <!-- Theme Filters -->
    <div class="theme-filters" id="themeFilters">
        <button class="active" data-theme="all">🏠 Semua Tema</button>
        <button data-theme="kata-ganti-sapaan">👋 Sapaan & Ganti</button>
        <button data-theme="keluarga">👨‍👩‍👧‍👦 Keluarga</button>
        <button data-theme="waktu">⏰ Waktu</button>
        <button data-theme="angka">🔢 Angka</button>
        <button data-theme="tempat">🏠 Tempat</button>
        <button data-theme="makanan">🍱 Makanan</button>
        <button data-theme="pakaian">👕 Pakaian</button>
        <button data-theme="tubuh">🧠 Tubuh</button>
        <button data-theme="hewan">🐾 Hewan</button>
        <button data-theme="warna">🎨 Warna</button>
        <button data-theme="sifat">🌈 Sifat</button>
        <button data-theme="verba-dasar">🏃 Verba Dasar</button>
        <button data-theme="verba-lanjutan">🔥 Verba Lanjutan</button>
        <button data-theme="abstrak">💭 Abstrak</button>
        <button data-theme="keterangan">⏳ Keterangan</button>
        <button data-theme="ucapan">💬 Ucapan</button>
        <button data-theme="penghubung">🔗 Penghubung</button>
        <button data-theme="lainnya">📌 Lainnya</button>
    </div>

    <!-- Grid -->
    <div class="vocab-grid" id="vocabGrid">
        <div class="loading-container">
            <div class="spinner"></div>
            <div>Memuat data...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- Scroll Top -->
    <button class="scroll-top" id="scrollTopBtn">↑</button>

    <!-- Footer -->
    <div class="footer">
        🌸 日本語 勉強 がんばって！ <span class="heart">❤</span><br />
        <span style="font-size: 0.65rem;">Total kosakata: <span id="footerTotal">0</span> • Dibagi dalam 19 tema</span>
    </div>

    <!-- ===== JavaScript ===== -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/theme-filter.js"></script>
    <script src="js/render.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
